name: Build Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install haxelibs
        run: |
          haxelib install lime         --quiet
          haxelib install openfl        --quiet
          haxelib install flixel        --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-ui     --quiet
          haxelib install hscript       --quiet
          haxelib install actuate       --quiet
          haxelib install polymod       --quiet
          haxelib install newgrounds    --quiet

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25
        run: sdkmanager "ndk;25.2.9519653"

      # lime setup android é interativo — passa as respostas via printf.
      # Ordem das perguntas: SDK path, NDK path, Java path.
      - name: Setup lime for Android
        run: |
          printf "%s\n%s\n%s\n" \
            "$ANDROID_SDK_ROOT" \
            "$ANDROID_SDK_ROOT/ndk/25.2.9519653" \
            "$JAVA_HOME" \
          | haxelib run lime setup android

      - name: Cache hxcpp
        uses: actions/cache@v4
        with:
          path: ~/.hxcpp
          key: hxcpp-android-${{ runner.os }}-${{ hashFiles('Project.xml') }}
          restore-keys: hxcpp-android-${{ runner.os }}-

      - name: Build APK (release)
        run: haxelib run lime build android -release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BobOnslaught-Android
          path: exportJon/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
