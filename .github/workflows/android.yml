name: Build Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 (exigido pelo sdkmanager 16+) ─────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Haxe ──────────────────────────────────────────────────────────────
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      # ── Haxelibs ──────────────────────────────────────────────────────────
      - name: Install haxelibs
        run: |
          haxelib install lime         --quiet
          haxelib install openfl        --quiet
          haxelib install flixel        --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-ui     --quiet
          haxelib install hscript       --quiet
          haxelib install actuate       --quiet
          haxelib install polymod       --quiet
          haxelib install newgrounds    --quiet

      # ── Android SDK + NDK r25 ─────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25
        run: sdkmanager "ndk;25.2.9519653"

      # ── Configura o lime escrevendo o config direto (sem wizard interativo) ─
      - name: Configure lime for Android
        run: |
          mkdir -p ~/.lime
          cat > ~/.lime/config.xml << LIMEEOF
          <?xml version="1.0" encoding="utf-8"?>
          <defines>
            <set name="ANDROID_SDK"      value="$ANDROID_SDK_ROOT" />
            <set name="ANDROID_NDK_ROOT" value="$ANDROID_SDK_ROOT/ndk/25.2.9519653" />
            <set name="JAVA_HOME"        value="$JAVA_HOME" />
          </defines>
          LIMEEOF

      # ── Cache do hxcpp ────────────────────────────────────────────────────
      - name: Cache hxcpp
        uses: actions/cache@v4
        with:
          path: ~/.hxcpp
          key: hxcpp-android-${{ runner.os }}-${{ hashFiles('Project.xml') }}
          restore-keys: hxcpp-android-${{ runner.os }}-

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build APK (release)
        run: haxelib run lime build android -release

      # ── Upload APK ────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BobOnslaught-Android
          path: exportJon/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
