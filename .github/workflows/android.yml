name: Build Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 11 (exigido pelo Android SDK) ────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Haxe ──────────────────────────────────────────────────────────────
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      # ── Haxelibs ──────────────────────────────────────────────────────────
      - name: Install haxelibs
        run: |
          haxelib install lime        --quiet
          haxelib install openfl       --quiet
          haxelib install flixel       --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-ui    --quiet
          haxelib install hscript      --quiet
          haxelib install actuate      --quiet
          haxelib install polymod      --quiet
          haxelib install newgrounds   --quiet
          haxelib run lime setup

      # ── Android SDK + NDK r25 ─────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25
        run: sdkmanager "ndk;25.2.9519653"

      # ── Configura o lime pra usar o NDK certo ─────────────────────────────
      - name: Configure lime Android
        run: |
          haxelib run lime config ANDROID_SDK  $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_SDK_ROOT/ndk/25.2.9519653
          haxelib run lime config JAVA_HOME    $JAVA_HOME

      # ── Cache do hxcpp (acelera compilações futuras) ──────────────────────
      - name: Cache hxcpp
        uses: actions/cache@v4
        with:
          path: ~/.hxcpp
          key: hxcpp-android-${{ runner.os }}-${{ hashFiles('Project.xml') }}
          restore-keys: hxcpp-android-${{ runner.os }}-

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build APK (release)
        run: haxelib run lime build android -release

      # ── Upload APK ────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BobOnslaught-Android
          path: exportJon/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
